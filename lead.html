	'use strict';
	console.log("[IP Info] Script loaded");
	document.addEventListener("DOMContentLoaded", function () {
		try {
			var form = document.querySelector("form.marketingForm");
			if (!form) {
				console.log("[IP Info] No marketing form found; aborting");
				return;
			}

			function setFieldValue(name, value) {
				if (!name) return;
				var el = form.querySelector('[name="' + name + '"]');
				if (!el) {
					el = document.createElement("input");
					el.type = "hidden";
					el.name = name;
					form.appendChild(el);
				}
				el.value = value == null ? "" : String(value);
				if (name === "IP") {
					console.log("[IP Info] IP field updated", { isTextarea: el.tagName === "TEXTAREA" });
				}
			}

			function joinNonEmpty(arr, sep) {
				return (Array.isArray(arr) ? arr : []).filter(function (x) { return x != null && String(x).trim().length > 0; }).join(sep);
			}

			function formatIpData(data) {
				var entries = [
					["IP Address", data.ipAddress],
					["IP Version", data.ipVersion],
					["Country", joinNonEmpty([data.countryName, data.countryCode], " / ")],
					["City", data.cityName],
					["Region", joinNonEmpty([data.regionName, data.regionCode], " / ")],
					["ZIP Code", data.zipCode],
					["Continent", joinNonEmpty([data.continent, data.continentCode], " / ")],
					["Latitude", data.latitude],
					["Longitude", data.longitude],
					["ASN", data.asn],
					["ASN Org", data.asnOrganization],
					["Proxy", data.isProxy != null ? String(data.isProxy) : ""],
					["Time Zones", Array.isArray(data.timeZones) ? data.timeZones.join(", ") : ""],
					["Phone Codes", Array.isArray(data.phoneCodes) ? data.phoneCodes.join(", ") : ""],
					["Languages", Array.isArray(data.languages) ? data.languages.join(", ") : ""],
					["Currencies", Array.isArray(data.currencies) ? data.currencies.join(", ") : ""]
				];
				var lines = [];
				entries.forEach(function (pair) {
					var label = pair[0];
					var val = pair[1];
					var str = val == null ? "" : String(val);
					if (str.trim().length === 0) { return; }
					lines.push(label);
					lines.push(str);
					lines.push("---");
				});
				if (lines.length && lines[lines.length - 1] === "---") {
					lines.pop();
				}
				return lines.join("\n");
			}

			var fields = [
				"ipinfo_ipAddress",
				"ipinfo_ipVersion",
				"ipinfo_countryName",
				"ipinfo_countryCode",
				"ipinfo_cityName",
				"ipinfo_regionName",
				"ipinfo_regionCode",
				"ipinfo_zipCode",
				"ipinfo_continent",
				"ipinfo_continentCode",
				"ipinfo_latitude",
				"ipinfo_longitude",
				"ipinfo_asn",
				"ipinfo_asnOrganization",
				"ipinfo_isProxy",
				"ipinfo_timeZone",
				"ipinfo_phoneCode",
				"ipinfo_language",
				"ipinfo_currency",
				"IP",
				"IP_json"
			];
			for (var i = 0; i < fields.length; i++) {
				setFieldValue(fields[i], "");
			}

			/**
			 * Create an AbortSignal with a timeout.
			 * @param {number} ms
			 * @returns {AbortSignal}
			 */
			function createAbortSignal(ms) {
				var controller = new AbortController();
				setTimeout(function () { controller.abort(); }, ms);
				return controller.signal;
			}

			/**
			 * Get requester IP (IPv4 preferred, falls back to IPv6).
			 * @returns {Promise<string|null>}
			 */
			function getIPAddress() {
				var signal = createAbortSignal(5000);
				return fetch("https://api4.ipify.org?format=json", { method: "GET", signal: signal })
					.then(function (res) { return res.ok ? res.json() : Promise.reject(res.status); })
					.then(function (j) { return (j && typeof j.ip === "string") ? j.ip : null; })
					.catch(function () {
						// Fallback to IPv6
						var signal6 = createAbortSignal(5000);
						return fetch("https://api6.ipify.org?format=json", { method: "GET", signal: signal6 })
							.then(function (res) { return res.ok ? res.json() : Promise.reject(res.status); })
							.then(function (j) { return (j && typeof j.ip === "string") ? j.ip : null; })
							.catch(function () { return null; });
					});
			}

			getIPAddress()
				.then(function (ip) {
					var endpoint = ip
						? "https://free.freeipapi.com/api/json/" + encodeURIComponent(ip)
						: "https://free.freeipapi.com/api/json/";
					console.log("[IP Info] Fetching:", endpoint, ip ? "(IP provided)" : "(auto)");
					return fetch(endpoint, { method: "GET", signal: createAbortSignal(5000) });
				})
				.then(function (res) { return res.ok ? res.json() : Promise.reject(res.status); })
				.then(function (data) {
					console.log("[IP Info] Received", data);
					// Store raw JSON separately and present cleaned output in IP field
					try {
						setFieldValue("IP_json", JSON.stringify(data));
					} catch (e) {
						console.log("[IP Info] JSON stringify failed", e);
					}
					var formatted = formatIpData(data);
					setFieldValue("IP", formatted);
					setFieldValue("ipinfo_ipAddress", data.ipAddress);
					setFieldValue("ipinfo_ipVersion", data.ipVersion);
					setFieldValue("ipinfo_countryName", data.countryName);
					setFieldValue("ipinfo_countryCode", data.countryCode);
					setFieldValue("ipinfo_cityName", data.cityName);
					setFieldValue("ipinfo_regionName", data.regionName);
					setFieldValue("ipinfo_regionCode", data.regionCode);
					setFieldValue("ipinfo_zipCode", data.zipCode);
					setFieldValue("ipinfo_continent", data.continent);
					setFieldValue("ipinfo_continentCode", data.continentCode);
					setFieldValue("ipinfo_latitude", data.latitude);
					setFieldValue("ipinfo_longitude", data.longitude);
					setFieldValue("ipinfo_asn", data.asn);
					setFieldValue("ipinfo_asnOrganization", data.asnOrganization);
					setFieldValue("ipinfo_isProxy", data.isProxy);
					setFieldValue("ipinfo_timeZone", Array.isArray(data.timeZones) ? data.timeZones[0] : "");
					setFieldValue("ipinfo_phoneCode", Array.isArray(data.phoneCodes) ? data.phoneCodes[0] : "");
					setFieldValue("ipinfo_language", Array.isArray(data.languages) ? data.languages[0] : "");
					setFieldValue("ipinfo_currency", Array.isArray(data.currencies) ? data.currencies[0] : "");
				})
				.catch(function (err) {
					console.error("[IP Info] Fetch failed", err);
				});
		} catch (err) {
			console.error("[IP Info] Fatal error", {
				message: err && err.message ? err.message : String(err),
				stack: err && err.stack ? err.stack : ""
			});
		}
	});

        (function () {
  const DEBUG = true;

  const TITLE_DIVISION = "Division";
  const TITLE_CATEGORY = "Norican Sales Category";
  const TITLE_PROCESS  = "Norican Sales Process";
  const TITLE_TOPIC    = "Topic";

  // ===========================
  // Console Logging (Colour‑Coded)
  // ===========================
  const styles = {
    base:   'padding:2px 6px;border-radius:4px;color:#fff;font-weight:600',
    success:'background:#16a34a',
    info:   'background:#2563eb',
    warn:   'background:#d97706',
    error:  'background:#dc2626'
  };

  function log(level, label, msg, extra) {
    if (!DEBUG) return;
    console.log(
      `%c${label}`,
      `${styles.base};${styles[level]}`,
      msg || "",
      extra || ""
    );
  }

  const logSuccess = (m,e)=>log('success','SUCCESS',m,e);
  const logInfo    = (m,e)=>log('info','INFO',m,e);
  const logWarn    = (m,e)=>log('warn','WARN',m,e);
  const logError   = (m,e)=>log('error','ERROR',m,e);

  // ===========================
  // Helpers
  // ===========================
  function ciMatchAttr(el, attr, value) {
    return (el.getAttribute(attr) || "").trim().toLowerCase() === value.toLowerCase();
  }

  function findByTitle(root, title) {
    const list = root.querySelectorAll("input[title], select[title], textarea[title]");
    for (const el of list) {
      if (ciMatchAttr(el, "title", title)) return el;
    }
    return null;
  }

  // Avoid rebinding the same root twice
  const boundRoots = new WeakSet();

  function bind(root) {
    if (boundRoots.has(root)) return;

    const divisionInput = findByTitle(root, TITLE_DIVISION);
    const categoryInput = findByTitle(root, TITLE_CATEGORY);
    const processInput  = findByTitle(root, TITLE_PROCESS);
    const topicInput    = findByTitle(root, TITLE_TOPIC);

    // Only bind if ALL fields exist
    if (!divisionInput || !categoryInput || !processInput || !topicInput) return;

    boundRoots.add(root);

    logInfo("Bound Division + Category + Process → Topic", root);

    function updateTopic(trigger = "input") {
      const division = divisionInput.value?.trim() || "";
      const category = categoryInput.value?.trim() || "";
      const process  = processInput.value?.trim() || "";

      if (!division && !category && !process) {
        logWarn("All fields empty — Topic not updated.", { trigger });
        return;
      }

      const parts = [division, category, process].filter(Boolean);
      const combined = parts.join(" - ");

      topicInput.value = combined;

      logSuccess("Topic updated.", {
        topic: combined,
        trigger
      });
    }

    // Attach listeners
    [divisionInput, categoryInput, processInput].forEach(input => {
      input.addEventListener("input",  () => updateTopic(`${input.title} input`));
      input.addEventListener("change", () => updateTopic(`${input.title} change`));
    });
  }

  // Bind to all existing forms
  document.querySelectorAll("form").forEach(bind);

  // Also bind to document root (in case fields aren't inside a form)
  bind(document);

  // Observe for dynamically added forms/fields
  const obs = new MutationObserver(mutations => {
    mutations.forEach(m => {
      m.addedNodes.forEach(node => {
        if (node.nodeType !== 1) return;

        if (node.matches?.("form")) bind(node);
        if (node.querySelector?.("[title]")) bind(document);
      });
    });
  });

  obs.observe(document.documentElement, {
    childList: true,
    subtree: true
  });

  logInfo("Norican Topic Auto‑Fill (with Division) initialised.");
})();

        (function () {
    // =========================

      if (extra !== undefined) parts.push(extra);

    }

    const logError   = (m, e) => log('error',   'ERROR',   m, e);

    // =========================
    // Helpers
    // =========================
    function ciAttrEquals(el, attr, expected) {
      const v = (el.getAttribute(attr) || '').trim();
      return v.localeCompare(expected, undefined, { sensitivity: 'accent' }) === 0
          || v.toLowerCase() === expected.toLowerCase();
    }

    function findByTitleCI(root, title) {
      // Case-insensitive match for input[title="..."]
      const all = root.querySelectorAll('input[title]');
      for (const el of all) {
        if (ciAttrEquals(el, 'title', title)) return el;
      }
      return null;
    }

    function getDomainFromEmail(email) {
      if (typeof email !== 'string') return '';
      const atIndex = email.lastIndexOf('@');
      if (atIndex === -1) return '';
      const domain = email.slice(atIndex + 1).trim();
      if (!domain || domain.includes(' ') || !domain.includes('.')) return '';
      return domain;
    }

    function buildWebsiteUrl(domain) {
      if (/^https?:\/\//i.test(domain)) return domain;
      return 'https://' + domain.replace(/^\/+/, '');
    }

    // Optional: enable to skip personal mail providers
    // const blocklist = new Set(['gmail.com','yahoo.com','outlook.com','hotmail.com','icloud.com','aol.com','proton.me','protonmail.com','gmx.com']);

    // Track bindings to avoid double-listeners
    const boundPairs = new WeakMap(); // form -> { emailInput, websiteInput, lastAutoValue }

    function bindForm(formOrDocument) {
      // We allow binding either to a <form> or the whole document (for pages without proper <form>)
      const root = formOrDocument;

      // Find the email and website inputs by title (case-insensitive)
      const emailInput = findByTitleCI(root, EMAIL_TITLE);
      const websiteInput = findByTitleCI(root, WEBSITE_TITLE);

      if (!emailInput || !websiteInput) {
        // If this is a <form>, log a warn per form; if it's the document, be less noisy.
        if (root instanceof HTMLFormElement) {
          if (!emailInput) logWarn(`No input with title "${EMAIL_TITLE}" in this form.`, root);
          if (!websiteInput) logWarn(`No input with title "${WEBSITE_TITLE}" in this form.`, root);
        }
        return false;
      }

      // Prevent re-binding on the same root
      if (boundPairs.has(root)) return true;

      const state = { emailInput, websiteInput, lastAutoValue: '' };
      boundPairs.set(root, state);

      function maybeUpdateWebsiteFromEmail(trigger = 'input') {
        const email = state.emailInput.value;
        const domain = getDomainFromEmail(email);

        if (!email) {
          logInfo(`No email yet (trigger: ${trigger}).`);
          return;
        }
        if (!domain) {
          logWarn('Invalid or incomplete email; cannot extract domain.', { email, trigger });
          return;
        }

        // if (blocklist.has(domain.toLowerCase())) {
        //   logInfo('Domain on blocklist; skipping auto-fill.', { domain, trigger });
        //   return;
        // }

        const proposed = buildWebsiteUrl(domain);

        if (!state.websiteInput.value) {
          state.websiteInput.value = proposed;
          state.lastAutoValue = proposed;
          logSuccess('Website auto-filled.', { proposed, trigger });
          return;
        }

        if (state.websiteInput.value === state.lastAutoValue) {
          state.websiteInput.value = proposed;
          state.lastAutoValue = proposed;
          logSuccess('Website updated from email (auto-managed).', { proposed, trigger });
          return;
        }

        logWarn('Website field has a user-entered value; not overwriting.', {
          currentWebsite: state.websiteInput.value,
          proposed,
          trigger
        });
      }

      state.emailInput.addEventListener('input', () => maybeUpdateWebsiteFromEmail('input'));
      state.emailInput.addEventListener('blur',  () => maybeUpdateWebsiteFromEmail('blur'));

      state.websiteInput.addEventListener('input', () => {
        if (!DEBUG) return;
        if (state.websiteInput.value !== state.lastAutoValue) {
          logInfo('User edited website field manually.', { value: state.websiteInput.value });
        }
      });

      logInfo('Bound email→website autofill on root', root);
      return true;
    }

    // Bind to each existing form
    const forms = Array.from(document.querySelectorAll('form'));
    let anyBound = false;
    for (const f of forms) {
      anyBound = bindForm(f) || anyBound;
    }

    // If no forms or none matched, try binding at document level (in case inputs aren't wrapped in a form)
    if (!anyBound) {
      bindForm(document);
    }

    // Observe DOM changes to auto-bind on dynamically added forms/inputs
    const observer = new MutationObserver(mutations => {
      let shouldRebindDoc = false;
      for (const m of mutations) {
        // If a form is added, try binding it
        m.addedNodes && m.addedNodes.forEach(node => {

            if (node.matches && node.matches('form')) {

            }

      }
      if (shouldRebindDoc) bindForm(document);
    });
    observer.observe(document.documentElement || document.body, { childList: true, subtree: true });

    logInfo('Email→Website script initialised (titles: "email" → "website").');
  })();

  // ---------- Session Storage Helpers ----------
  function saveParamsToSession(params, reset = false) {
    groupStart("Session Storage: Save Params", true);
    try {
      FIELD_MAP.forEach(({ key }) => {
        const urlVal = params.get(key);
        const existing = sessionStorage.getItem(key);
        if (urlVal !== null && urlVal !== "") {
          if (reset || existing === null) {
            sessionStorage.setItem(key, urlVal);
            logSuccess(`Saved '${key}' = '${urlVal}' to sessionStorage${reset ? " (reset)" : ""}.`);
          } else {
            logInfo(`Skipped '${key}' (already exists and reset=false). existing='${existing}'.`);
          }
        } else if (STORE_DEFAULTS_IN_SESSION && (existing === null || reset)) {
          // Optional: store default if no URL value
          sessionStorage.setItem(key, DEFAULT_VALUE);
          logWarn(`No URL value for '${key}'. Stored default '${DEFAULT_VALUE}' in sessionStorage.`);
        } else {
          logInfo(`No URL value for '${key}' — leaving sessionStorage as is.`);
        }
      });
    } catch (e) {
      logError("Error writing to sessionStorage:", e.message || e);
    } finally {
      groupEnd();
    }
  }
  // Returns a value from session → URL → DEFAULT_VALUE
  function getValueForKey(params, key) {
    const fromSession = sessionStorage.getItem(key);
    if (fromSession !== null && fromSession !== "") return fromSession;
    const fromUrl = params.get(key);
    if (fromUrl !== null && fromUrl !== "") return fromUrl;
    return DEFAULT_VALUE; // fallback when nothing is tracked
  }
  function populateMTMFields(rootDoc) {
    groupStart("Populate MTM Fields");
    try {
      const params = new URLSearchParams(rootDoc.defaultView ? rootDoc.defaultView.location.search : window.location.search);
      const reset = ["1", "true", "yes"].includes((params.get(RESET_FLAG_PARAM) || "").toLowerCase());
      logInfo("URL params:", params.toString() || "(none)");
      if (reset) logWarn(`Reset flag detected via '${RESET_FLAG_PARAM}' — URL values will overwrite sessionStorage.`);
      // 1) Persist mtm_* URL params into session storage (respecting reset)
      saveParamsToSession(params, reset);
      // 2) Compute and store cleaned Referrer URL
      groupStart("Referrer URL (clean)");
      const cleanUrl = buildCleanUrl(rootDoc.defaultView ? rootDoc.defaultView.location : window.location);
      try {
        sessionStorage.setItem(REFERRER_URL_SESSION_KEY, cleanUrl);
        logSuccess("Saved cleaned referrer URL to sessionStorage:", cleanUrl);
      } catch (e) {
        logError("Failed saving cleaned referrer URL to sessionStorage:", e.message || e);
      }
      groupEnd();
      // Check if none of the MTM values exist (URL or session)
      const hasAnyMTM =
        FIELD_MAP.some(({ key }) => {
          const s = sessionStorage.getItem(key);
          const u = params.get(key);
          return (s && s !== "") || (u && u !== "");
        });
      if (!hasAnyMTM) {
        logWarn("No MTM params found in session or URL. Fields will be populated with default:", DEFAULT_VALUE);
      }
      // 3) Retry loop to fill fields (including Referrer URL) after form renders
      let attempt = 0;
      const maxAttempts = 5;
      const delayMs = 250;
      const tryFill = () => {
        attempt++;
        let filledCount = 0;
        groupStart(`Attempt ${attempt}/${maxAttempts}`, true);
        // Fill MTM fields (with default fallback)
        for (const { title, key } of FIELD_MAP) {
          const value = getValueForKey(params, key);
          const field = findFieldByTitle(rootDoc, title);
          if (!field) {
            logWarn(`Field '${title}' not found on attempt ${attempt}.`);
            continue;
          }
          setFieldValue(field, value);
          const isDefault = value === DEFAULT_VALUE;
          logSuccess(`Set '${title}' to '${value}'.${isDefault ? " (default applied)" : ""}`);
          filledCount++;
        }
        // Fill Referrer URL field
        const refField = findFieldByTitle(rootDoc, REFERRER_URL_FIELD_TITLE);
        if (refField) {
          const value = sessionStorage.getItem(REFERRER_URL_SESSION_KEY) || cleanUrl;

          logSuccess(`Set '${REFERRER_URL_FIELD_TITLE}' to cleaned URL.`);
          filledCount++;
        } else {
          logWarn(`Field '${REFERRER_URL_FIELD_TITLE}' not found on attempt ${attempt}.`);

        const totalTargets = FIELD_MAP.length + 1; // + Referrer URL

        } else {
          logError(`Completed ${filledCount}/${totalTargets} after ${maxAttempts} attempts. Some fields not found.`);
          groupEnd(); // end Populate MTM Fields
        }

      logError("Unhandled error while populating MTM fields:", e.message || e);
